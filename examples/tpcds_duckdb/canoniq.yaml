project_name: tpcds_demo

warehouse:
  type: duckdb
  path: ./warehouse.db

query_log:
  type: file
  path: ./queries.sql

output:
  formats: [metricflow, osi]
  dir: ./canoniq_output/

ontorank:
  weights:
    source_authority: 0.30
    usage_frequency: 0.25
    cross_source_agreement: 0.20
    recency: 0.15
    certification_status: 0.10
  thresholds:
    auto_merge: 0.85
    review: 0.50
    drop: 0.50

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  max_retries: 3

continuous:
  enabled: false
  poll_interval_seconds: 300
